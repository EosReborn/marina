<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Galéria – Marina Pizzéria &amp; Steakhouse</title>
  <meta name="description" content="Marina Pizzéria &amp; Steakhouse éttermi galériája – pizzák, steakek, pasták, saláták és desszertek képei Mosonmagyaróváron.">

  <!-- Preconnect for faster image loading -->
  <link rel="preconnect" href="https://www.marinapizzeria.hu">

  <style>
    /* ─── Design tokens ──────────────────────────────────────────── */
    :root {
      --clr-bg:        #f9f6f1;
      --clr-surface:   #ffffff;
      --clr-brand:     #c0392b;      /* Marina red */
      --clr-brand-dk:  #962d22;
      --clr-text:      #1a1a1a;
      --clr-muted:     #6b6b6b;
      --clr-border:    #e4ddd4;
      --clr-overlay:   rgba(15, 10, 5, 0.92);

      --radius:        6px;
      --gap:           12px;
      --transition:    200ms ease;

      --font-display:  'Georgia', 'Times New Roman', serif;
      --font-body:     system-ui, -apple-system, sans-serif;
    }

    /* ─── Reset & base ───────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--clr-bg);
      color: var(--clr-text);
      font-family: var(--font-body);
      line-height: 1.5;
    }

    /* ─── Page header ────────────────────────────────────────────── */
    .gallery-header {
      text-align: center;
      padding: 3rem 1rem 2rem;
      border-bottom: 1px solid var(--clr-border);
    }

    .gallery-header h1 {
      font-family: var(--font-display);
      font-size: clamp(1.8rem, 5vw, 2.8rem);
      font-weight: 400;
      letter-spacing: 0.02em;
      color: var(--clr-text);
    }

    .gallery-header h1 span {
      color: var(--clr-brand);
    }

    .gallery-header p {
      margin-top: 0.5rem;
      color: var(--clr-muted);
      font-size: 0.95rem;
    }

    /* ─── Gallery grid ───────────────────────────────────────────── */
    .gallery-section {
      max-width: 1400px;
      margin: 0 auto;
      padding: 2rem 1rem 4rem;
    }

    .gallery-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);   /* mobile: 2 col */
      gap: var(--gap);
    }

    @media (min-width: 640px) {
      .gallery-grid {
        grid-template-columns: repeat(3, 1fr);  /* tablet: 3 col */
      }
    }

    @media (min-width: 1024px) {
      .gallery-grid {
        grid-template-columns: repeat(4, 1fr);  /* desktop: 4 col */
      }
    }

    /* ─── Gallery item ───────────────────────────────────────────── */
    .gallery-item {
      position: relative;
      overflow: hidden;
      border-radius: var(--radius);
      background: var(--clr-border);
      cursor: pointer;
      aspect-ratio: 4 / 3;
    }

    .gallery-item img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      transition: transform 350ms ease, filter 350ms ease;
      /* Lazy loading shimmer placeholder */
      background: linear-gradient(90deg, #ede8e0 25%, #f5f0e8 50%, #ede8e0 75%);
      background-size: 200% 100%;
    }

    .gallery-item:hover img,
    .gallery-item:focus-within img {
      transform: scale(1.06);
      filter: brightness(0.82);
    }

    /* Caption overlay on hover */
    .gallery-item__caption {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      padding: 0.6rem 0.75rem;
      background: linear-gradient(transparent, rgba(0,0,0,0.65));
      color: #fff;
      font-size: 0.78rem;
      font-weight: 500;
      opacity: 0;
      transform: translateY(4px);
      transition: opacity var(--transition), transform var(--transition);
      pointer-events: none;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .gallery-item:hover .gallery-item__caption,
    .gallery-item:focus-within .gallery-item__caption {
      opacity: 1;
      transform: translateY(0);
    }

    /* Focus ring for keyboard users */
    .gallery-item:focus-visible {
      outline: 3px solid var(--clr-brand);
      outline-offset: 2px;
    }

    /* ─── Lightbox ───────────────────────────────────────────────── */
    .lightbox {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 9999;
      background: var(--clr-overlay);
      align-items: center;
      justify-content: center;
      padding: 1rem;
    }

    .lightbox.is-open {
      display: flex;
    }

    .lightbox__backdrop {
      position: absolute;
      inset: 0;
      cursor: zoom-out;
    }

    .lightbox__inner {
      position: relative;
      z-index: 1;
      max-width: min(90vw, 1100px);
      max-height: 90vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.75rem;
    }

    .lightbox__img {
      max-width: 100%;
      max-height: calc(90vh - 80px);
      object-fit: contain;
      border-radius: var(--radius);
      box-shadow: 0 20px 60px rgba(0,0,0,0.6);
      background: #222;
    }

    .lightbox__caption {
      color: rgba(255,255,255,0.85);
      font-size: 0.9rem;
      text-align: center;
      min-height: 1.4em;
    }

    .lightbox__close {
      position: fixed;
      top: 1rem;
      right: 1.25rem;
      background: none;
      border: none;
      color: #fff;
      font-size: 2rem;
      line-height: 1;
      cursor: pointer;
      padding: 0.25rem 0.5rem;
      border-radius: 4px;
      transition: background var(--transition);
      z-index: 2;
    }

    .lightbox__close:hover { background: rgba(255,255,255,0.15); }

    .lightbox__nav {
      position: fixed;
      top: 50%;
      transform: translateY(-50%);
      background: rgba(255,255,255,0.12);
      border: none;
      color: #fff;
      font-size: 1.8rem;
      line-height: 1;
      cursor: pointer;
      padding: 0.6rem 0.9rem;
      border-radius: 4px;
      transition: background var(--transition);
      z-index: 2;
    }

    .lightbox__nav:hover { background: rgba(255,255,255,0.25); }
    .lightbox__nav--prev { left: 0.5rem; }
    .lightbox__nav--next { right: 0.5rem; }

    .lightbox__counter {
      position: fixed;
      bottom: 1rem;
      left: 50%;
      transform: translateX(-50%);
      color: rgba(255,255,255,0.6);
      font-size: 0.8rem;
      letter-spacing: 0.06em;
    }

    /* ─── Loading skeleton animation ────────────────────────────── */
    @keyframes shimmer {
      to { background-position: -200% 0; }
    }

    .gallery-item img:not([src]) {
      animation: shimmer 1.4s infinite linear;
    }

    /* ─── Reduced motion ─────────────────────────────────────────── */
    @media (prefers-reduced-motion: reduce) {
      .gallery-item img,
      .gallery-item__caption,
      .lightbox { transition: none; }
    }
  </style>

      { src: 'galeria-gyros-tzatziki-hasabbal-es-vitaminsalival-2022-03-18-15-22-52.jpg', alt: 'Gyros tzatzikivel, hasábbal és vitaminsalátával' },
      { src: 'galeria-grillsteak-2022-03-18-15-23-38.jpg',                  alt: 'Grillsteak' },
      { src: 'galeria-fokhagymas-steak-2022-03-18-15-24-44.jpg',            alt: 'Fokhagymás steak' },
      { src: 'galeria-csirkemell-classico-2022-03-18-15-25-16.jpg',         alt: 'Csirkemell Classico' },
      { src: 'galeria-gombas-steak-2022-03-18-15-26-30.jpg',                alt: 'Gombás steak' },
      { src: 'galeria-antipasti-itali-2022-03-18-15-27-01.jpg',             alt: 'Antipasti Itali' },
    ];

    // ─── Render gallery items ─────────────────────────────────────
    const grid = document.getElementById('galleryGrid');

    images.forEach((img, index) => {
      const fullUrl = BASE + img.src;

      const item = document.createElement('div');
      item.className = 'gallery-item';
      item.setAttribute('role', 'listitem');
      item.setAttribute('tabindex', '0');
      item.setAttribute('aria-label', img.alt || `Kép ${index + 1}`);

      const el = document.createElement('img');
      el.alt = img.alt;
      el.loading = 'lazy';         // native lazy loading
      el.decoding = 'async';
      el.src = fullUrl;

      // Explicit dimensions hint (all originals are landscape)
      el.width  = 800;
      el.height = 600;

      const caption = document.createElement('span');
      caption.className = 'gallery-item__caption';
      caption.textContent = img.alt;
      caption.setAttribute('aria-hidden', 'true');

      item.appendChild(el);
      if (img.alt) item.appendChild(caption);

      // Open lightbox on click or Enter/Space
      item.addEventListener('click', () => openLightbox(index));
      item.addEventListener('keydown', e => {
        if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); openLightbox(index); }
      });

      grid.appendChild(item);
    });

    // ─── Lightbox ─────────────────────────────────────────────────
    const lightbox  = document.getElementById('lightbox');
    const lbImg     = document.getElementById('lbImg');
    const lbCaption = document.getElementById('lbCaption');
    const lbCounter = document.getElementById('lbCounter');
    const lbClose   = document.getElementById('lbClose');
    const lbPrev    = document.getElementById('lbPrev');
    const lbNext    = document.getElementById('lbNext');
    const lbBackdrop = document.getElementById('lbBackdrop');

    let currentIndex = 0;

    function openLightbox(index) {
      currentIndex = index;
      updateLightbox();
      lightbox.classList.add('is-open');
      document.body.style.overflow = 'hidden';
      lbClose.focus();
    }

    function closeLightbox() {
      lightbox.classList.remove('is-open');
      document.body.style.overflow = '';
      // Return focus to the triggering item
      const items = grid.querySelectorAll('.gallery-item');
      if (items[currentIndex]) items[currentIndex].focus();
    }

    function updateLightbox() {
      const { src, alt } = images[currentIndex];
      lbImg.src = BASE + src;
      lbImg.alt = alt;
      lbCaption.textContent = alt;
      lbCounter.textContent = `${currentIndex + 1} / ${images.length}`;
    }

    function showPrev() {
      currentIndex = (currentIndex - 1 + images.length) % images.length;
      updateLightbox();
    }

    function showNext() {
      currentIndex = (currentIndex + 1) % images.length;
      updateLightbox();
    }

    lbClose.addEventListener('click', closeLightbox);
    lbBackdrop.addEventListener('click', closeLightbox);
    lbPrev.addEventListener('click', showPrev);
    lbNext.addEventListener('click', showNext);

    // Keyboard navigation
    document.addEventListener('keydown', e => {
      if (!lightbox.classList.contains('is-open')) return;
      if (e.key === 'Escape')      closeLightbox();
      if (e.key === 'ArrowLeft')   showPrev();
      if (e.key === 'ArrowRight')  showNext();
    });

    // Touch / swipe support
    let touchStartX = 0;
    lightbox.addEventListener('touchstart', e => {
      touchStartX = e.changedTouches[0].clientX;
    }, { passive: true });
    lightbox.addEventListener('touchend', e => {
      const dx = e.changedTouches[0].clientX - touchStartX;
      if (Math.abs(dx) > 50) dx < 0 ? showNext() : showPrev();
    }, { passive: true });
  </script>
